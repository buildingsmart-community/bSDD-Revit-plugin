#prod.yml

name: Deploy to Production
on:
  push:
    # this will cause the action to run on pushes to main
    branches: [ dev ]  # change this tomain once that branch exists
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  Build:
    # The type of runner that the job will run on
    runs-on: windows-latest
    env:
        Solution_Name: BsddRevitPlugin.sln
    outputs:
      Version: ${{ steps.gitversion.outputs.nuGetVersionV2 }} 
      CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}   
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
       # install and calculate the new version with GitVersion  
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.10.2
        with:
          versionSpec: '5.12.0'

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v0.10.2
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
        
        id: gitversion # step id used as reference for output values
      - name: Display GitVersion outputs
        run: |
          echo "MajorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}"
          echo "NuGetVersionV2: ${{ steps.gitversion.outputs.nuGetVersionV2 }}"   
          echo "CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}"    
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/ASRRtechnologies/index.json" --name "GitHub ASRR" --username "jcathalina" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text
          nuget restore $env:Solution_Name 

      # Update the version inside of the .iss file
      - name: Updating the version into the installer
        run: (Get-Content BsddRevitPlugin.Installer/Installer.iss) -replace 'MyAppVersion "1.0.0"', 'MyAppVersion "v${{ steps.gitversion.outputs.majorMinorPatch }}"' | Out-File -encoding ASCII BsddRevitPlugin.Installer/Installer.iss

      - name: Run MSBuild
        id: run-msbuild
        run: |
          msbuild $env:Solution_Name /t:Clean,Build /p:platform="x64" /p:Configuration=Release

      - name: Run tests
        id: run-tests
        run: |
          dotnet test

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "BsddRevitPlugin.Installer\Installer.iss"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.gitversion.outputs.majorMinorPatch }}
          name: bSDD Revit Plugin v${{ steps.gitversion.outputs.majorMinorPatch }}
          draft: false
          prerelease: false
          files: |
            BsddRevitPlugin.Installer/Output/bSDD-Revit-plugin-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}